name: rebuild-release-history

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-release-history
  cancel-in-progress: false

jobs:
  rebuild:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[rebuild-release-history]')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.RELEASE_HISTORY_TOKEN != '' && secrets.RELEASE_HISTORY_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch upstream tags
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/router-for-me/Cli-Proxy-API-Management-Center.git
          else
            git remote add upstream https://github.com/router-for-me/Cli-Proxy-API-Management-Center.git
          fi
          git fetch origin --force --tags
          git fetch upstream main --force --tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Clean legacy releases and tags
        shell: bash
        run: |
          set -euo pipefail

          cleanup_file=".github/release-history/cleanup-tags.txt"
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            [[ "${tag}" == \#* ]] && continue

            echo "Cleaning ${tag}"
            if gh release view "${tag}" >/dev/null 2>&1; then
              gh release delete "${tag}" --yes --cleanup-tag
            fi

            git tag -d "${tag}" >/dev/null 2>&1 || true
            git push origin ":refs/tags/${tag}" >/dev/null 2>&1 || true
          done < "${cleanup_file}"

      - name: Rebuild release history
        shell: bash
        run: |
          set -euo pipefail

          emit_error() {
            local title="$1"
            local message="$2"
            message="${message//'%'/'%25'}"
            message="${message//$'\r'/'%0D'}"
            message="${message//$'\n'/'%0A'}"
            echo "::error title=${title}::${message}"
          }

          run_with_log() {
            local title="$1"
            shift
            local log_file
            log_file="$(mktemp)"
            if "$@" >"${log_file}" 2>&1; then
              cat "${log_file}"
              rm -f "${log_file}"
              return 0
            fi

            local summary
            summary="$(tail -n 40 "${log_file}")"
            emit_error "${title}" "${summary}"
            cat "${log_file}" >&2
            rm -f "${log_file}"
            return 1
          }

          plan_file=".github/release-history/rebuild-plan.tsv"
          while IFS=$'\t' read -r tag version base_tag source_commit previous_tag previous_commit; do
            [[ -n "${tag}" ]] || continue
            [[ "${tag}" == \#* ]] && continue

            echo "Rebuilding ${tag} from ${source_commit}"
            notes_file="$(mktemp)"
            build_dir="$(mktemp -d)"

            run_with_log "release-notes ${tag}" \
              env \
                VERSION="${version}" \
                RELEASE_TARGET_COMMIT="${source_commit}" \
                RELEASE_BASE_TAG="${base_tag}" \
                RELEASE_PREVIOUS_TAG="${previous_tag}" \
                RELEASE_PREVIOUS_COMMIT="${previous_commit}" \
                bash ./scripts/release-notes.sh "${notes_file}"

            git worktree add --detach "${build_dir}" "${source_commit}"

            run_with_log "build ${tag}" \
              env \
                BUILD_DIR="${build_dir}" \
                VERSION="${version}" \
                bash -lc 'cd "${BUILD_DIR}" && npm ci && VERSION="${VERSION}" npm run build && mv dist/index.html dist/management.html'

            if gh release view "${tag}" >/dev/null 2>&1; then
              gh release delete "${tag}" --yes --cleanup-tag
            fi
            git push origin ":refs/tags/${tag}" >/dev/null 2>&1 || true

            run_with_log "publish ${tag}" \
              env \
                RELEASE_TAG="${tag}" \
                RELEASE_NAME="${version}" \
                RELEASE_TARGET_COMMIT="${source_commit}" \
                RELEASE_NOTES_FILE="${notes_file}" \
                GH_TOKEN="${GH_TOKEN}" \
                python3 ./scripts/publish-release.py \
                "${build_dir}/dist/management.html"

            git worktree remove --force "${build_dir}"
            rm -f "${notes_file}"
          done < "${plan_file}"
