name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch upstream tags
        shell: bash
        run: |
          set -euo pipefail
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/router-for-me/Cli-Proxy-API-Management-Center.git
          else
            git remote add upstream https://github.com/router-for-me/Cli-Proxy-API-Management-Center.git
          fi
          git fetch origin --force --tags
          git fetch upstream main --force --tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          eval "$(bash ./scripts/version.sh release "${GITHUB_REF_NAME}" | sed 's/^/export /')"
          release_tag="${RELEASE_TAG}"
          release_name="${RELEASE_NAME}"
          build_version="${VERSION}"
          release_kind="tag"

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "build_version=${build_version}"
            echo "release_kind=${release_kind}"
          } >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.build_version }}
        run: |
          set -euo pipefail
          bash ./scripts/release-notes.sh release-notes.md

      - name: Install dependencies
        run: npm ci

      - name: Build all-in-one HTML
        run: npm run build
        env:
          VERSION: ${{ steps.meta.outputs.build_version }}

      - name: Prepare release assets
        run: |
          cd dist
          mv index.html management.html
          ls -lh management.html

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          files: dist/management.html
          body_path: release-notes.md
          draft: false
          prerelease: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
